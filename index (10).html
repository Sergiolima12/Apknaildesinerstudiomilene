<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nail designer studio milene</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#d81b60">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>💅</text></svg>">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root { --pink-soft: #ffc1cc; --pink-dark: #d81b60; --gold: #d4af37; --white-glass: rgba(255, 255, 255, 0.98); }
        
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; }
        
        body { 
            background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #ffd1ff, #fbc2eb); 
            background-size: 400% 400%; 
            animation: gradientBG 15s ease infinite; 
            display: flex; justify-content: center; 
            padding: 15px; min-height: 100vh; 
        }

        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .app-container { 
            width: 100%; max-width: 700px; 
            background: var(--white-glass); 
            border-radius: 30px; padding: 25px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.15); 
            height: fit-content; 
        }
        
        header { text-align: center; border-bottom: 2px solid var(--pink-soft); margin-bottom: 20px; padding-bottom: 10px; }
        h1 { color: var(--pink-dark); font-size: 20px; text-transform: lowercase; letter-spacing: 1px; }

        .nav-buttons { display: flex; gap: 10px; margin: 20px 0; }
        .nav-buttons button { flex: 1; padding: 14px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-client { background: var(--pink-dark); color: white; }
        .btn-adm { background: #333; color: white; }

        /* Agenda Cliente */
        .calendar-container { max-height: 450px; overflow-y: auto; padding-right: 5px; }
        .day-card { background: #fff; border: 1px solid #ffe4e8; padding: 15px; border-radius: 20px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .day-card strong { color: var(--pink-dark); display: block; margin-bottom: 8px; }
        .day-card input, .day-card select { width: 100%; margin-bottom: 8px; padding: 10px; border: 1px solid #eee; border-radius: 10px; outline: none; }

        /* Painel ADM */
        #admin-view { display: none; }
        .monthly-summary { background: #333; color: white; padding: 20px; border-radius: 15px; margin: 15px 0; text-align: center; }
        .summary-val { font-size: 24px; font-weight: bold; color: var(--pink-soft); display: block; }

        .finance-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); gap: 10px; max-height: 250px; overflow-y: auto; background: #fdfdfd; padding: 10px; border-radius: 15px; border: 1px solid #eee; }
        .day-sale { display: flex; flex-direction: column; font-size: 10px; align-items: center; }
        .day-sale input { width: 100%; border: 1px solid #ddd; border-radius: 8px; padding: 5px; text-align: center; font-weight: bold; }

        .btn-pdf { background: #27ae60; color: white; width: 100%; padding: 15px; border: none; border-radius: 12px; margin-top: 10px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        /* Modais */
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 3000; }
        .modal { background: white; padding: 30px; border-radius: 25px; width: 90%; max-width: 350px; text-align: center; }
        .pass-container { position: relative; width: 100%; }
        .modal input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 12px; }
        .toggle-pass { position: absolute; right: 15px; top: 22px; cursor: pointer; }

        #install-btn { background: var(--gold); color: white; border: none; border-radius: 50px; padding: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
        th { background: #f4f4f4; padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div style="font-size: 40px;">💅</div>
        <h1>nail designer studio milene</h1>
        <button id="install-btn">📲 baixar aplicativo</button>
    </header>

    <div class="nav-buttons">
        <button class="btn-client" onclick="showSection('client')">agendar</button>
        <button class="btn-adm" onclick="openAuthModal()">painel adm</button>
    </div>

    <section id="client-view">
        <div class="calendar-container" id="calendarGrid"></div>
    </section>

    <section id="admin-view">
        <div class="monthly-summary">
            <span style="font-size: 11px; opacity: 0.8;">VENDAS TOTAIS DO MÊS</span>
            <span class="summary-val" id="mesTotal">R$ 0,00</span>
        </div>

        <p style="font-size: 12px; font-weight: bold; margin-bottom: 10px;">Lançamento Financeiro (30 dias):</p>
        <div class="finance-grid" id="financeGrid"></div>

        <button class="btn-pdf" onclick="gerarPDFVendas()">📥 baixar relatório de vendas</button>

        <div style="margin-top: 25px;">
            <strong>Agendamentos Registrados</strong>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr><th>Data/Hora</th><th>Cliente</th><th>Ações</th></tr>
                    </thead>
                    <tbody id="adminBody"></tbody>
                </table>
            </div>
        </div>
        
        <button class="btn-pdf" style="background: #2980b9;" onclick="gerarPDFAgenda()">📥 baixar agendamentos</button>
        <button class="btn-adm" style="width: 100%; margin-top: 20px; background: #c0392b;" onclick="logout()">sair do painel</button>
    </section>
</div>

<div class="overlay" id="authOverlay">
    <div class="modal">
        <h3 id="authTitle">acesso restrito</h3>
        <input type="email" id="email" placeholder="e-mail">
        <div class="pass-container">
            <input type="password" id="pass" placeholder="senha">
            <span class="toggle-pass" onclick="togglePassword()">👁️</span>
        </div>
        <button onclick="handleAuth()" id="authBtn" style="width:100%; padding: 12px; background: #d81b60; color:white; border:none; border-radius:10px; font-weight:bold;">entrar</button>
        <span id="authSwitch" onclick="switchAuthMode()" style="font-size:12px; color:var(--pink-dark); cursor:pointer; display:block; margin-top:15px; text-decoration:underline;">não tem conta? cadastre-se</span>
        <button onclick="closeAuthModal()" style="background:none; border:none; color:#999; margin-top:15px;">cancelar</button>
    </div>
</div>

<script>
    // Inicialização de Dados com LocalStorage
    let agendamentos = JSON.parse(localStorage.getItem('milene_agenda_final')) || [];
    let vendasMensais = JSON.parse(localStorage.getItem('milene_vendas_final')) || new Array(30).fill(0);
    let usuarios = JSON.parse(localStorage.getItem('milene_users')) || [{email: "naildesinerstudiomilene@gmail.com", pass: "Endrew 04"}];
    let isRegisterMode = false;

    // Criar Calendário e Grid Financeiro
    function init() {
        const grid = document.getElementById('calendarGrid');
        const fGrid = document.getElementById('financeGrid');
        grid.innerHTML = ""; fGrid.innerHTML = "";
        const hoje = new Date();
        
        for(let i = 0; i < 30; i++) {
            let data = new Date(); data.setDate(hoje.getDate() + i);
            let dFmt = data.toLocaleDateString('pt-BR');
            
            grid.innerHTML += `
                <div class="day-card">
                    <strong>📅 ${dFmt}</strong>
                    <input type="text" id="nome-${i}" placeholder="seu nome">
                    <select id="hora-${i}">
                        <option value="">escolher horário</option>
                        ${Array.from({length: 11}, (_, h) => `<option value="${h+8}:00">${h+8}:00</option><option value="${h+8}:30">${h+8}:30</option>`).join('')}
                    </select>
                    <input type="text" id="serv-${i}" placeholder="serviço">
                    <button onclick="salvar(${i}, '${dFmt}')" style="width:100%; background:var(--gold); border:none; color:white; padding:10px; border-radius:10px; font-weight:bold;">confirmar</button>
                </div>`;

            fGrid.innerHTML += `
                <div class="day-sale">
                    <span>dia ${i+1}</span>
                    <input type="number" value="${vendasMensais[i]}" oninput="updateVenda(${i}, this.value)">
                </div>`;
        }
        calcTotalVendas();
    }

    // Gerenciamento de Autenticação
    function togglePassword() {
        const p = document.getElementById('pass');
        p.type = p.type === "password" ? "text" : "password";
    }

    function switchAuthMode() {
        isRegisterMode = !isRegisterMode;
        document.getElementById('authTitle').innerText = isRegisterMode ? "cadastrar adm" : "acesso restrito";
        document.getElementById('authBtn').innerText = isRegisterMode ? "cadastrar" : "entrar";
        document.getElementById('authSwitch').innerText = isRegisterMode ? "já tem conta? entrar" : "não tem conta? cadastre-se";
    }

    function handleAuth() {
        const e = document.getElementById('email').value;
        const p = document.getElementById('pass').value;
        if(isRegisterMode) {
            usuarios.push({email: e, pass: p});
            localStorage.setItem('milene_users', JSON.stringify(usuarios));
            alert("Cadastro realizado!"); switchAuthMode();
        } else {
            const user = usuarios.find(u => u.email === e && u.pass === p);
            if(user) { showSection('admin'); closeAuthModal(); } else alert("Dados incorretos!");
        }
    }

    // Funções Financeiras e Agendamento
    function updateVenda(idx, val) {
        vendasMensais[idx] = parseFloat(val) || 0;
        localStorage.setItem('milene_vendas_final', JSON.stringify(vendasMensais));
        calcTotalVendas();
    }

    function calcTotalVendas() {
        const total = vendasMensais.reduce((a, b) => a + b, 0);
        document.getElementById('mesTotal').innerText = `R$ ${total.toFixed(2).replace('.',',')}`;
    }

    function salvar(idx, data) {
        const n = document.getElementById(`nome-${idx}`).value;
        const h = document.getElementById(`hora-${idx}`).value;
        if(!n || !h) return alert("Preencha nome e hora!");
        agendamentos.push({ id: Date.now(), data, hora: h, nome: n, servico: document.getElementById(`serv-${idx}`).value });
        localStorage.setItem('milene_agenda_final', JSON.stringify(agendamentos));
        alert("Agendamento salvo!"); init();
    }

    // Geração de PDF (Download Direto)
    function gerarPDFVendas() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("Relatório de Vendas - Studio Milene", 105, 15, {align: 'center'});
        const rows = vendasMensais.map((v, i) => [`Dia ${i+1}`, `R$ ${v.toFixed(2)}`]);
        const total = vendasMensais.reduce((a, b) => a + b, 0);
        rows.push([{content: 'TOTAL MENSAL', styles: {fillColor: [51, 51, 51], textColor: 255}}, `R$ ${total.toFixed(2)}`]);
        doc.autoTable({ head: [['Período', 'Valor']], body: rows, startY: 25 });
        doc.save("vendas_studio_milene.pdf");
    }

    function gerarPDFAgenda() {
        const { jsPDF } = window.jspdf;
        if(agendamentos.length === 0) return alert("Nenhum agendamento!");
        const doc = new jsPDF();
        doc.text("Agenda - Studio Milene", 105, 15, {align: 'center'});
        const rows = agendamentos.map(a => [a.data, a.hora, a.nome, a.servico || '-']);
        doc.autoTable({ head: [['Data', 'Hora', 'Cliente', 'Serviço']], body: rows, startY: 25 });
        doc.save("agenda_studio_milene.pdf");
    }

    // Interface e Navegação
    function showSection(sec) {
        document.getElementById('client-view').style.display = sec === 'admin' ? 'none' : 'block';
        document.getElementById('admin-view').style.display = sec === 'admin' ? 'block' : 'none';
        if(sec === 'admin') renderAdmin();
    }

    function renderAdmin() {
        const b = document.getElementById('adminBody'); b.innerHTML = "";
        agendamentos.forEach((a, i) => {
            b.innerHTML += `<tr><td>${a.data}<br><b>${a.hora}</b></td><td>${a.nome}</td><td><button onclick="excluir(${i})" style="color:red; border:none; background:none;">excluir</button></td></tr>`;
        });
    }

    function excluir(i) { agendamentos.splice(i, 1); localStorage.setItem('milene_agenda_final', JSON.stringify(agendamentos)); renderAdmin(); }
    function openAuthModal() { document.getElementById('authOverlay').style.display = 'flex'; }
    function closeAuthModal() { document.getElementById('authOverlay').style.display = 'none'; }
    function logout() { showSection('client'); }

    // Lógica para Download do App no Navegador
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('install-btn').style.display = 'block';
    });

    document.getElementById('install-btn').onclick = async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt = null;
        } else {
            alert("No celular: Clique em 'Compartilhar' e 'Adicionar à tela de início'.\nNo computador: Clique no ícone de instalação na barra de endereços.");
        }
    };

    init();
</script>
</body>
    </html>
